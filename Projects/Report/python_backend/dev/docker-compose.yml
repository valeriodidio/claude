services:
  mysql:
    image: mysql:8.0
    container_name: yeppon_reports_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: yeppon_stats
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
